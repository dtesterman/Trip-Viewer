+Airport+ELM",price:"$400–560/pp RT",priceType:"est",note:"Connecting flight, no direct service. Pick up rental car at ELM — 15 min to your hotel in Corning.",emoji:"✈️"},{time:"Late Afternoon",name:"Check In — Radisson or HGI Corning",mapsQuery:"Radisson+Hotel+Corning+NY",price:"$100–160/night",priceType:"est",note:"Gaffer District, walking distance to Market Street. Your home base for all 7 nights.",emoji:"🏨"},{time:"Evening",name:"Walk Franklin Street, Watkins Glen",mapsQuery:"Franklin+Street+Watkins+Glen+NY",price:"Free",priceType:"free",note:"35-min drive north to Watkins Glen village. Shops, restaurants, and the harbor along Seneca Lake.",emoji:"🚶"},{time:"Dinner",name:"Jerlando’s Ristorante & Pizza",mapsQuery:"Jerlando's+Ristorante+Pizza+Watkins+Glen+NY",note:"Family-run Italian institution in the heart of Watkins Glen. Beloved by locals and returning visitors for decades.",emoji:"🍽️"},{time:"Night",name:"Return to Corning",note:"35-min drive back to hotel.",emoji:"😴",isSleep:!0}],tip:"Grab groceries or snacks at a Corning store on arrival — handy for race day and late evenings when you’re driving back from Watkins Glen."},{dayNum:2,title:"Motorsports History + Race Weekend Opens",subtitle:"History & culture",date:"Friday, May 8",color:"blue",stops:[{time:"9:00 AM – 12:00 PM",name:"Intl Motor Racing Research Center",mapsQuery:"International+Motor+Racing+Research+Center+Watkins+Glen+NY",price:"Free",priceType:"free",note:"F1, NASCAR, and sports car racing history at The Glen. Rotating race car displays. Open Mon–Fri 9–5 only — must visit today.",emoji:"🏎️"},{time:"Afternoon",name:"NASCAR Truck Series Atmosphere at WGI",mapsQuery:"Watkins+Glen+International+Raceway+NY",price:"Optional",priceType:"optional",note:"Soak up the race weekend energy as teams set up and practice runs begin.",emoji:"🏁"},{time:"Dinner",name:"Blue Point Grill",mapsQuery:"Blue+Point+Grill+Watkins+Glen+NY",note:"Lakefront American dining with fire pits and Seneca Lake marina views.",emoji:"🍽️"},{time:"Night",name:"Return to Corning",note:"",emoji:"😴",isSleep:!0}],tip:"The IMRRC is the only weekday-only stop on this trip. Don’t push it to another day — it won’t be open Saturday or Sunday."},{dayNum:3,title:"Scenic Drive + Race Weekend Day 2",subtitle:"Nature & scenic",date:"Saturday, May 9",color:"green",stops:[{time:"Morning",name:"Taughannock Falls Overlook",mapsQuery:"Taughannock+Falls+Overlook+Trumansburg+NY",price:"Free",priceType:"free",note:"Drive-up viewpoint of a 215-foot waterfall — taller than Niagara Falls. No hiking required.",emoji:"🌊"},{time:"Late Morning",name:"Franklin Street Shops & Harbor Stroll",mapsQuery:"Franklin+Street+Watkins+Glen+NY",price:"Free",priceType:"free",note:"Browse the village shops and enjoy the Seneca Lake harbor at a leisurely pace.",emoji:"🛍️"},{time:"Afternoon",name:"NASCAR Xfinity Series Race",mapsQuery:"Watkins+Glen+International+Raceway+NY",price:"Optional",priceType:"optional",note:"Saturday’s supporting race at WGI. A good warm-up for Sunday’s Cup Series event.",emoji:"🏁"},{time:"Dinner",name:"Seneca Lodge",mapsQuery:"Seneca+Lodge+Watkins+Glen+NY",note:"Local institution steeped in Watkins Glen racing history and character.",emoji:"🍽️"},{time:"Night",name:"Return to Corning",note:"",emoji:"😴",isSleep:!0}],tip:"Hit Taughannock Falls early before heading to Watkins Glen — the morning light on the gorge is spectacular."},{dayNum:4,title:"🏁 NASCAR Cup Series Race Day",subtitle:"Mother’s Day · The main event",date:"Sunday, May 10",color:"purple",stops:[{time:"Morning",name:"Breakfast in Corning",note:"Casual breakfast near the hotel before heading out. Keep it simple — it’s going to be a long, exciting day.",emoji:"☕"},{time:"1:00 PM arrival · 3:00 PM start",name:"NASCAR Cup Series — Go Bowling at The Glen",mapsQuery:"Watkins+Glen+International+Raceway+NY",price:"~$105–110/pp",priceType:"confirmed",note:"Frontstretch Grandstand — start/finish line with pit road views. Free parking, free shuttles. Arrive by 1 PM.",emoji:"🏁"},{time:"Dinner",name:"Light Dinner in Corning",note:"Head back to Corning after the race. Market Street has plenty of casual options.",emoji:"🍽️"},{time:"Night",name:"Corning Hotel",note:"",emoji:"😴",isSleep:!0}],tip:"Bring sunscreen, ear protection, and a portable seat cushion. Grandstand seats are aluminum bleachers. Coolers are allowed — check theglen.com for current size limits."},{dayNum:5,title:"Seneca Falls + Relaxed Afternoon",subtitle:"Day trip + recharge",date:"Monday, May 11",color:"teal",stops:[{time:"Morning",name:"Drive to Seneca Falls",mapsQuery:"Seneca+Falls+NY",note:"~45 min north from Corning. Famous as the inspiration for Bedford Falls in It’s a Wonderful Life.",emoji:"🚗"},{time:"Late Morning",name:"“Bedford Falls” Bridge & Village Walk",mapsQuery:"Bedford+Falls+Bridge+Seneca+Falls+NY",price:"Free",priceType:"free",note:"The real-life bridge that inspired George Bailey’s rescue. Walk the village center along the river.",emoji:"🌉"},{time:"Afternoon",name:"Explore Corning’s Gaffer District",mapsQuery:"Market+Street+Corning+NY+Gaffer+District",price:"Free",priceType:"free",note:"Back in Corning by early afternoon. Shops and galleries at your own pace. A relaxed recharge day.",emoji:"🛍️"},{time:"Dinner",name:"Three Birds Restaurant",mapsQuery:"Three+Birds+Restaurant+Corning+NY",note:"Chef-owned American on Market Street. Locals’ favorite for over 20 years.",emoji:"🍽️"},{time:"Night",name:"Corning Hotel",note:"",emoji:"😴",isSleep:!0}],tip:"IaWL Museum is closed Mondays — don’t try to squeeze it in today. We’re coming back to Seneca Falls tomorrow when it’s open."},{dayNum:6,title:"IaWL Museum + Corning Museums",subtitle:"History & culture",date:"Tuesday, May 12",color:"blue",stops:[{time:"11:00 AM (opens)",name:"It’s a Wonderful Life Museum",mapsQuery:"Its+a+Wonderful+Life+Museum+Seneca+Falls+NY",price:"Free",priceType:"free",note:"Celebrates connections between Seneca Falls and the classic film. Open Tue–Sat 11am–4pm.",emoji:"🎬"},{time:"E
