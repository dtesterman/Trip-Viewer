ceType:"free",emoji:"🚶"},{id:"d0-s5",time:"Dinner",name:"Fried Green Tomatoes",note:"Italian fine dining in a restored 1838 building on Main Street. Reservations recommended.",mapQuery:"Fried+Green+Tomatoes+Galena+IL",emoji:"🍽️"},{id:"d0-s6",time:"Night",name:"Club Wyndham Galena",note:"",isSleep:!0,sleepLabel:"Night 1",emoji:"😴"}]},{dayNumber:1,title:"Galena History & Grant Trail",subtitle:"Friday, Sep 11 · History & culture",category:"culture",tip:"Galena Trolley Tours offers a Tour of Homes ($38/pp, ~2.5 hrs) that includes house admissions — call 815-777-1248 to confirm it’s offered in 2026.",stops:[{id:"d1-s1",time:"10:00 AM",name:"U.S. Grant Home State Historic Site",note:"The Italianate home gifted to Grant by Galena citizens after the Civil War. Guided tours of the preserved interior.",mapQuery:"U.S.+Grant+Home+State+Historic+Site+Galena+IL",price:"Free",priceType:"free",emoji:"🏛️"},{id:"d1-s2",time:"11:30 AM",name:"Galena & U.S. Grant Museum",note:"1858 Italianate mansion with 6,000 sq ft of exhibits. Features a real 1830s lead mine shaft in the basement.",mapQuery:"Galena+U.S.+Grant+Museum+Galena+IL",price:"~$15/pp",priceType:"est",emoji:"🏛️"},{id:"d1-s3",time:"12:30 PM",name:"Lunch on Main Street",note:"Plenty of options within a few blocks. Casual and walkable.",emoji:"🍽️"},{id:"d1-s4",time:"2:00 PM",name:"Belvedere Mansion",note:"1857 Italianate mansion with period furnishings and green drapes from Gone with the Wind.",mapQuery:"Belvedere+Mansion+Galena+IL",price:"~$15/pp",priceType:"est",emoji:"🏛️"},{id:"d1-s5",time:"3:30 PM",name:"Thunder Bay Falls",note:"40-foot waterfall tucked into a wooded ravine. Short paved path from the parking area — no hiking required.",mapQuery:"Thunder+Bay+Falls+Galena+IL",price:"Free",priceType:"free",emoji:"🌊"},{id:"d1-s6",time:"Dinner",name:"Log Cabin Steakhouse",note:"A Galena institution since 1937. Greek-influenced steaks and chops in a rustic log cabin setting.",mapQuery:"Log+Cabin+Steakhouse+Galena+IL",emoji:"🍽️"},{id:"d1-s7",time:"Night",name:"Club Wyndham Galena",note:"",isSleep:!0,sleepLabel:"Night 2",emoji:"😴"}]},{dayNumber:2,title:"Chestnut Mountain Scenic Day",subtitle:"Saturday, Sep 12 · Nature & scenic",category:"scenic",tip:"Confirm the river cruise is running in September — the schedule may reduce to weekends only after Labor Day. Call Chestnut Mountain at 815-777-1320.",stops:[{id:"d2-s1",time:"10:30 AM",name:"Chestnut Mountain — Chairlift Ride",note:"Scenic chairlift up the bluff with panoramic views of the Mississippi River Valley.",mapQuery:"Chestnut+Mountain+Resort+Galena+IL",emoji:"🏔️"},{id:"d2-s2",time:"12:00 PM",name:"The Summit Food & Spirits",note:"Perched atop Chestnut Mountain with Mississippi River Valley views from a 1,400 sq ft deck. Steaks, seafood, and signature sandwiches.",mapQuery:"The+Summit+Food+and+Spirits+Chestnut+Mountain+Galena+IL",emoji:"🍽️"},{id:"d2-s3",time:"2:00 PM",name:"Mississippi River Cruise",note:"1.5-hour narrated cruise. Wildlife, bluffs, and river history. Bald eagles and herons are common sightings.",mapQuery:"Chestnut+Mountain+Resort+river+cruise+Galena+IL",price:"~$25–35/pp",priceType:"est",emoji:"🚢"},{id:"d2-s4",time:"5:00 PM",name:"Scenic Drive via Blackjack Road",note:"Wind through the rolling hills of the Driftless Area on the way back to Galena.",mapQuery:"Blackjack+Road+Galena+IL",price:"Free",priceType:"free",emoji:"🗺️"},{id:"d2-s5",time:"Dinner",name:"Dinner in Galena",note:"Last evening in Galena. Pick from the Main Street restaurants or return to a favorite.",emoji:"🍽️"},{id:"d2-s6",time:"Night",name:"Club Wyndham Galena",note:"",isSleep:!0,sleepLabel:"Night 3 — last Wyndham night",emoji:"😴"}]},{dayNumber:3,title:"Rockford, Roscoe & Railway Museum → Woodstock",subtitle:"Sunday, Sep 13 · Day trip east · Check into Cherry Tree Inn",category:"daytrip",tip:"IRM runs full steam, diesel & electric trains through September — all three types stop after September. Arrive by 3 PM to catch the last departure at 4 PM.",stops:[{id:"d3-s1",time:"8:00 AM",name:"Check out Club Wyndham — Drive to Rockford",note:"~1.5 hours east on US-20. Rolling farmland gives way to the Rock River Valley.",mapQuery:"Rockford+IL",emoji:"🚗"},{id:"d3-s2",time:"9:30 AM",name:"Anderson Japanese Gardens",note:"Rated the highest-quality Japanese garden in North America. Koi ponds, waterfalls, stone paths, and tea house on 12 acres. Fully accessible on paved paths.",mapQuery:"Anderson+Japanese+Gardens+Rockford+IL",price:"$10–11/pp",priceType:"price",emoji:"🌿"},{id:"d3-s3",time:"11:15 AM",name:"Quick Lunch in Rockford",note:"Fresco at the Gardens (if timing works) or a casual spot nearby before heading to Roscoe.",emoji:"🍽️"},{id:"d3-s4",time:"12:00 PM",name:"Historic Auto Attractions — Roscoe",note:"86,000 sq ft of presidential limos, movie cars, and pop-culture artifacts. JFK’s limo, Bonnie & Clyde’s car, and hundreds more. ~15 min from Rockford.",mapQuery:"Historic+Auto+Attractions+Roscoe+IL",price:"$28/pp",priceType:"price",emoji:"🏎️"},{id:"d3-s5",time:"2:00 PM",name:"Drive to Union",note:"~1 hour east on I-90 toward Chicago, then south to Union. IRM is on the way to Woodstock.",mapQuery:"Illinois+Railway+Museum+Union+IL",emoji:"🚗"},{id:"d3-s6",time:"3:00 PM",name:"Illinois Railway Museum",note:"North America’s largest railway museum. In September, steam, diesel, and electric trains all operate. Ride vintage trains on the museum’s own rail lines.",mapQuery:"Illinois+Railway+Museum+Union+IL",price:"$18/pp (senior)",priceType:"price",emoji:"🚂"},{id:"d3-s7",time:"5:30 PM",name:"Check in — Cherry Tree Inn B&B",note:"The actual Victorian B&B from Groundhog Day — Bill Murray’s character stayed here in the film. Each room includes a DVD player with a copy of the movie. Call to book; no online reservations.",mapQuery:"Cherry+Tree+Inn+Bed+and+Breakfast+Woodstock+IL",price:"$238–279/night",priceType:"est",emoji:"🏨"},{id:"d3-s8",time:"7:00 PM",name:"Dinner at Squire on the Square",note:"The bar where Phil and Rita toast to world peace in the film. Right on the historic Woodstock Square.",mapQuery:"Squire+on+the+Square+Woodstock+IL",emoji:"🍽️"},{id:"d3-s9",time:"Night",name:"Cherry Tree Inn B&B",note:"",isSleep:!0,sleepLabel:"Night 4 — Cherry Tree Inn",emoji:"😴"}]},{dayNumber:4,title:"🎬 Groundhog Day Walking Tour",subtitle:"Monday, Sep 14 · Film locations & culture · No driving",category:"film",tip:"No driving today — walk everything. The entire Square is the film set. Take your time and enjoy it without rushing.",stops:[{id:"d4-s1",time:"Morning",name:"B&B Breakfast at Cherry Tree Inn",note:"Full breakfast included with your stay. Eat in the same house where Bill Murray filmed his morning scenes.",price:"Included",priceType:"included",emoji:"☕"},{id:"d4-s2",time:"10:00 AM",name:"Woodstock Square Historic District",note:"The heart of “Punxsutawney, PA” in the film. The 19th-century Victorian buildings, courthouse, and surrounding streets are largely unchanged since filming.",mapQuery:"Woodstock+Square+Historic+District+Woodstock+IL",price:"Free",priceType:"free",emoji:"🎬"},{id:"d4-s3",time:"10:30 AM",name:"Woodstock Opera House",note:"Prominently featured in the film and a must-see for Groundhog Day fans. Recently renovated with updated theatrical equipment.",mapQuery:"Woodstock+Opera+House+Woodstock+IL",price:"Free (exterior)",priceType:"free",emoji:"🎭"},{id:"d4-s4",time:"11:00 AM",name:"Bill Murray Mural & Sculpture Garden",note:"Charming alley at 229 Main St with a Groundhog Day mural, a groundhog statue, and an Orson Welles statue. Connected to the Main Street Pedway.",mapQuery:"229+Main+St+Woodstock+IL",price:"Free",priceType:"free",emoji:"🎨"},{id:"d4-s5",time:"11:30 AM",name:"Gobbler’s Knob",note:"Southwest corner of Woodstock Square Park — the “prediction” scene where Phil covers the groundhog ceremony. A plaque marks the spot.",mapQuery:"Gobbler's+Knob+Woodstock+Square+IL",price:"Free",priceType:"free",emoji:"🎬"},{id:"d4-s6",time:"11:45 AM",name:"The Puddle Corner — 100 Cass Stre
